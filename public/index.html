<!DOCTYPE html>
<html lang="en">
<head>
<base href="./">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Worldcast</title>
<link rel="stylesheet" href="styles.css">
</head>
<body data-view="libraryView">

<header class="app-header">
  <h1>Worldcast</h1>
  <button id="syncBtn" class="icon-btn" title="Sync now" aria-label="Sync now">↻</button>
</header>

<main id="main">

  <!-- LIBRARY VIEW -->
  <section id="libraryView" class="view active">
    <div class="library-actions">
      <button id="addFeedBtn" class="primary">+ Add Feed</button>
      <span id="syncStatus" class="muted small"></span>
    </div>

    <section id="recentSection" class="recent-section" hidden>
      <div class="section-head">
        <h2>Recently played</h2>
        <button id="recentToggle" class="ghost small" type="button" hidden>Show all</button>
      </div>
      <ul id="recentList" class="episode-list"></ul>
    </section>

    <h2 class="section-head-solo">Feeds</h2>
    <ul id="feedList" class="feed-list"></ul>
  </section>

  <!-- EPISODES VIEW -->
  <section id="episodesView" class="view">
    <button id="backToLib" class="back-btn" type="button">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
      Library
    </button>
    <div id="feedHeader" class="feed-header"></div>
    <ul id="episodeList" class="episode-list"></ul>
  </section>

  <!-- EPISODE DETAILS VIEW -->
  <section id="detailsView" class="view">
    <button id="backFromDetails" class="back-btn" type="button">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 6l-6 6 6 6"/></svg>
      Back
    </button>
    <div id="detailsHeader" class="details-header"></div>
    <div class="details-actions">
      <button id="detailsPlayBtn" class="primary">▶ Play</button>
      <button id="detailsImgBtn" class="ghost-btn" type="button" title="Toggle remote images in description">🖼 Images: off</button>
    </div>
    <div id="detailsDescription" class="details-description"></div>
  </section>

  <!-- PLAYER VIEW — full-screen "Now Playing" sheet -->
  <section id="playerView" class="view">
    <div id="playerGlow" class="player-glow" aria-hidden="true"></div>

    <div class="player-top">
      <button id="playerClose" class="player-close" type="button" aria-label="Close player">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>

    <div class="player-scroll">
      <div class="artwork-wrap">
        <img id="playerArtwork" alt="">
        <video id="playerVideo" playsinline preload="metadata" hidden></video>
      </div>
      <div class="chapter-info">
        <div id="playerChapter" class="chapter-title" role="button" tabindex="0" title="Open episode details">—</div>
        <div id="playerEpisode" class="chapter-meta">—</div>
      </div>
      <section class="chapter-list-wrap" id="chapterListWrap" hidden>
        <h3 class="chapter-list-heading">Chapters</h3>
        <ul id="chapterList" class="chapter-list"></ul>
      </section>
    </div>

    <div class="player-dock glass">
      <div class="scrub">
        <div class="scrub-bar" id="scrubBar">
          <div class="scrub-marks" id="scrubMarks"></div>
          <div class="scrub-fill" id="scrubFill"></div>
        </div>
        <div class="scrub-labels">
          <span id="curTime">0:00</span>
          <button id="speedBtn" class="speed-btn" type="button" title="Playback speed">1×</button>
          <span id="durTime">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button id="prevChBtn" class="ctrl ctrl-ch" type="button" aria-label="Previous chapter">
          <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 5h2.2v14H7z"/><path d="M19 5v14L9.5 12z"/></svg>
        </button>
        <button id="seekBackBtn" class="ctrl ctrl-seek" type="button" aria-label="Back 15 seconds">
          <svg class="ic" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
            <text x="12.3" y="15.6" text-anchor="middle" font-size="7.6" font-weight="800" fill="currentColor" font-family="-apple-system,system-ui,sans-serif">15</text>
          </svg>
        </button>
        <button id="playBtn" class="ctrl ctrl-play" type="button" aria-label="Play / pause">
          <svg class="ic ic-play"  viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5 19 12 8 18.5z"/></svg>
          <svg class="ic ic-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="6.5" y="5" width="3.6" height="14" rx="1.3"/><rect x="13.9" y="5" width="3.6" height="14" rx="1.3"/></svg>
        </button>
        <button id="seekFwdBtn" class="ctrl ctrl-seek" type="button" aria-label="Forward 30 seconds">
          <svg class="ic" viewBox="0 0 24 24" aria-hidden="true">
            <g transform="translate(24,0) scale(-1,1)"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></g>
            <text x="11.7" y="15.6" text-anchor="middle" font-size="7.6" font-weight="800" fill="currentColor" font-family="-apple-system,system-ui,sans-serif">30</text>
          </svg>
        </button>
        <button id="nextChBtn" class="ctrl ctrl-ch" type="button" aria-label="Next chapter">
          <svg class="ic" viewBox="0 0 24 24" aria-hidden="true"><path d="M14.8 5H17v14h-2.2z"/><path d="M5 5l9.5 7L5 19z"/></svg>
        </button>
      </div>
    </div>
  </section>

</main>

<!-- MINI PLAYER -->
<aside id="miniPlayer" class="mini-player glass" hidden>
  <img id="miniArtwork" src="icons/icon-192.png" alt="">
  <div class="mini-text">
    <div id="miniTitle" class="mini-title">—</div>
    <div id="miniMeta"  class="mini-meta muted">—</div>
  </div>
  <button id="miniPlayBtn" class="primary" type="button" aria-label="Play / pause">
    <svg class="ic ic-play"  viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5.5 19 12 8 18.5z"/></svg>
    <svg class="ic ic-pause" viewBox="0 0 24 24" aria-hidden="true"><rect x="6.5" y="5" width="3.6" height="14" rx="1.3"/><rect x="13.9" y="5" width="3.6" height="14" rx="1.3"/></svg>
  </button>
</aside>

<!-- SHUFFLE — floating random-play button, library view only (shown via
     body[data-view] in CSS). Keeps #playRandomBtn so app.js binding stands. -->
<button id="playRandomBtn" class="shuffle-fab" type="button" title="Play a random never-played episode">
  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M16 3h5v5"/><path d="M4 20 21 3"/><path d="M21 16v5h-5"/><path d="M15 15l6 6"/><path d="M4 4l5 5"/>
  </svg>
  Shuffle
</button>

<!-- BOTTOM TAB BAR — primary nav -->
<nav class="tab-bar glass" aria-label="Primary">
  <button id="navLibrary" class="tab active" type="button">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="5" rx="1.6"/><rect x="3" y="13" width="18" height="5" rx="1.6"/></svg>
    Library
  </button>
  <button id="navNowPlaying" class="tab" type="button">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M10 8.5l6 3.5-6 3.5z" fill="currentColor" stroke="none"/></svg>
    Now Playing
  </button>
</nav>

<!-- ADD FEED DIALOG -->
<dialog id="addFeedDialog" class="dialog">
  <form method="dialog" id="addFeedForm">
    <h2>Add Feed</h2>
    <input type="url" id="feedUrl" placeholder="https://example.com/feed.xml" autocomplete="off" required>
    <p id="addFeedErr" class="err small" hidden></p>
    <menu>
      <button value="cancel" class="ghost">Cancel</button>
      <button id="addFeedSubmit" value="ok" class="primary">Add</button>
    </menu>
  </form>
</dialog>

<audio id="audio" preload="metadata"></audio>
<!-- #playerVideo doubles as both the media element and the artwork display
     for video episodes; the Player class swaps which element is "active". -->


<script type="module" src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // SW URL is relative to the document → resolves under BASE_PATH.
      // Scope defaults to the SW's URL directory, which matches BASE_PATH/.
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
